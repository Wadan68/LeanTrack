<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LeanTrack</title>

<link rel="manifest" href="manifest.json">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "PingFang SC",
  sans-serif;

  background:#0f0c29;
  color:white;
}

.hidden{
  display:none;
}

.login-page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:24px;
}

.logo{
  text-align:center;
  margin-bottom:40px;
}

.logo h1{
  font-size:36px;
}

.logo p{
  color:#aaa;
  margin-top:8px;
}

.card{
  background:rgba(255,255,255,.06);
  border-radius:16px;
  padding:20px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#b8a4f8;
  font-weight:bold;
  cursor:pointer;
}

.dashboard{
  padding:20px;
}

.dashboard h1{
  margin-bottom:8px;
}

#userEmail{
  color:#aaa;
  margin-bottom:20px;
}

.action-buttons{
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.stat-card{
  background:rgba(255,255,255,.06);
  border-radius:14px;
  padding:16px;
}

.stat-value{
  font-size:28px;
  font-weight:bold;
  margin-top:8px;
}

.chart-card{
  margin-top:20px;
  background:rgba(255,255,255,.06);
  border-radius:14px;
  padding:16px;
}

.chart-title{
  margin-bottom:15px;
  font-weight:bold;
}

canvas{
  max-height:300px;
}

</style>

</head>

<body>

<!-- 登录页 -->

<div id="loginPage" class="login-page">

  <div class="logo">
    <h1>LeanTrack</h1>
    <p>Track Progress. Stay Lean.</p>
  </div>

  <div class="card">


<div>邮箱登录</div>

<input
  id="emailInput"
  type="email"
  placeholder="请输入邮箱">

<button onclick="login()">
  发送登录链接
</button>

<div
  id="loginMsg"
  style="margin-top:12px;color:#aaa;">
</div>

  </div>

</div>

<!-- Dashboard -->

<div id="dashboard" class="dashboard hidden">

  <h1>LeanTrack</h1>

  <p id="userEmail"></p>

  <div class="action-buttons">

<button onclick="addWeight()">
  + 记录体重
</button>

<button onclick="addWaist()">
  + 记录腰围
</button>

<button onclick="toggleSettings()">
  ⚙️ 设置
</button>

  </div>

  <div class="stats">

 
<div class="stat-card">
  <div>今日净热量</div>
  <div class="stat-value" id="netCalories">
    --
  </div>
</div>

<div class="stat-card">
  <div>当前体重</div>
  <div class="stat-value" id="currentWeight">
    --
  </div>
</div>

<div class="stat-card">
  <div>腰围</div>
  <div class="stat-value" id="currentWaist">
    --
  </div>
</div>

<div class="stat-card">
  <div>体脂率</div>
  <div class="stat-value" id="bodyFat">
    --
  </div>
</div>

<div class="stat-card">
  <div>腰高比</div>
  <div class="stat-value" id="whtr">
    --
  </div>
</div>

    <div class="stat-card">
  <div>距离目标</div>
  <div
    class="stat-value"
    id="goalRemaining">
    --
  </div>
</div>

  </div>
<div
  id="settingsPanel"
  class="card hidden"
  style="margin-top:20px">

  <h3>个人资料</h3>

  <input
    id="heightInput"
    type="number"
    placeholder="身高(cm)">

  <input
    id="birthYearInput"
    type="number"
    placeholder="出生年份">

  <input
    id="targetWeightInput"
    type="number"
    placeholder="目标体重(kg)">

  <button onclick="saveProfile()">
    保存资料
  </button>

</div>
  
  
  <div class="chart-card">

 
<div class="chart-title">
  最近30天体重趋势
</div>

<canvas id="weightChart"></canvas>
 

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="supabase.js"></script>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

  
</body>
</html>
