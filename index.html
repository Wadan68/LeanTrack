<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LeanTrack</title>

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "PingFang SC",
  sans-serif;

  background:#0f0c29;
  color:white;
}

.hidden{
  display:none;
}

.login-page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:24px;
}

.logo{
  text-align:center;
  margin-bottom:40px;
}

.logo h1{
  font-size:36px;
}

.logo p{
  color:#aaa;
  margin-top:8px;
}

.card{
  background:rgba(255,255,255,.06);
  border-radius:16px;
  padding:20px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#b8a4f8;
  font-weight:bold;
  cursor:pointer;
}

.dashboard{
  padding:20px;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:20px;
}

.stat-card{
  background:rgba(255,255,255,.06);
  border-radius:14px;
  padding:16px;
}

.stat-value{
  font-size:28px;
  font-weight:bold;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- 登录 -->

<div id="loginPage" class="login-page">

  <div class="logo">
    <h1>LeanTrack</h1>
    <p>Track Progress. Stay Lean.</p>
  </div>

  <div class="card">

    <div>邮箱登录</div>

    <input
      id="emailInput"
      type="email"
      placeholder="请输入邮箱">

    <button onclick="login()">
      发送登录链接
    </button>

    <div
      id="loginMsg"
      style="margin-top:12px;color:#aaa;">
    </div>

  </div>

</div>

<!-- 首页 -->

<div id="dashboard" class="dashboard hidden">

  <h1>LeanTrack</h1>

  <p id="userEmail"></p>
<div style="margin-top:20px">

  <button onclick="addWeight()">
    + 记录体重
  </button>
  
<button onclick="addWaist()">
  + 记录腰围
</button>
  
</div>
  <div class="stats">

    <div class="stat-card">
      <div>今日净热量</div>
      <div class="stat-value" id="netCalories">
        --
      </div>
    </div>

    <div class="stat-card">
      <div>当前体重</div>
      <div class="stat-value" id="currentWeight">
        --
      </div>
    </div>

    <div class="stat-card">
      <div>腰围</div>
      <div class="stat-value" id="currentWaist">
        --
      </div>
    </div>

    <div class="stat-card">
      <div>体脂率</div>
      <div class="stat-card">
  <div>腰高比</div>
  <div class="stat-value" id="whtr">
    --
  </div>
</div>
      <div class="stat-value" id="bodyFat">
        --
      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
